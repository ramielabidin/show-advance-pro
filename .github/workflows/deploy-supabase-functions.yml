# Auto-deploy Supabase edge functions on push to main.
#
# Why this exists: the Vercel/Lovable frontend auto-deploys on merge to main,
# but Supabase edge functions do NOT. Without this workflow, edge functions
# only update when someone manually runs `supabase functions deploy` from
# their laptop, which is how the stale slack-oauth-initiate deployment
# drifted months behind the repo (see PR #22 / #23 / #24).
#
# Required GitHub repository secret:
#   SUPABASE_ACCESS_TOKEN  — personal access token from
#                            https://supabase.com/dashboard/account/tokens
#
# The project ref (knwdjeicyisqsfiisaic) is already public in
# supabase/config.toml, so it does not need to be a secret.

name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase-functions.yml"
  # Allow manual runs from the Actions tab as an escape hatch (e.g. for
  # re-deploying after rotating a secret or recovering from a failed run).
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: knwdjeicyisqsfiisaic
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # `supabase functions deploy` with no function name deploys every
      # function in supabase/functions/*. Redeploying unchanged functions
      # is a no-op on Supabase's side, so we don't bother diffing which
      # ones changed — simplicity wins.
      - name: Deploy all edge functions
        run: supabase functions deploy --project-ref "$PROJECT_REF"
