# slack-oauth-initiate validates the user's JWT itself via
# supabase.auth.getUser(), so we skip the edge-function gateway's built-in
# verify_jwt. The gateway only speaks HS256 and 401s ES256 tokens (new
# asymmetric signing keys) with UNAUTHORIZED_UNSUPPORTED_TOKEN_ALGORITHM.
[functions.slack-oauth-initiate]
verify_jwt = false

# slack-oauth-callback is the URL Slack redirects the user's browser to
# after authorization. That request carries no Supabase JWT — just the
# Slack `code` and our HMAC-signed `state` — so gateway JWT verification
# must be disabled or every OAuth redirect 401s.
[functions.slack-oauth-callback]
verify_jwt = false

# parse-advance validates the caller's JWT itself via supabase.auth.getUser(),
# so we bypass the gateway's built-in verify_jwt for the same ES256 reason as
# slack-oauth-initiate above — otherwise every call 401s at the gateway.
[functions.parse-advance]
verify_jwt = false

# calculate-drive-time takes no user-scoped data and is only called from
# authenticated app sessions; disable gateway verify_jwt to avoid ES256
# token rejection.
[functions.calculate-drive-time]
verify_jwt = false

# push-slack-daysheet validates the caller via supabase.auth.getUser() and
# looks up their Slack tokens; disable gateway verify_jwt to avoid ES256
# token rejection (same reason as slack-oauth-initiate above).
[functions.push-slack-daysheet]
verify_jwt = false

# autocomplete-place and lookup-venue-address are called from authenticated
# app sessions but only proxy Google Places requests; disable gateway
# verify_jwt to avoid ES256 token rejection.
[functions.autocomplete-place]
verify_jwt = false

[functions.lookup-venue-address]
verify_jwt = false

# inbound-email is SendGrid's Inbound Parse webhook. It's called by SendGrid's
# servers (not an authenticated app session), carries no Supabase JWT, and
# must silently 200 on anything it doesn't recognize. Disable gateway
# verify_jwt so SendGrid can reach it.
[functions.inbound-email]
verify_jwt = false

# send-daysheet-email validates the caller's JWT itself via
# supabase.auth.getUser() and enforces team-membership before sending.
# Disable gateway verify_jwt for the same ES256 reason as the other
# functions above — otherwise every call 401s at the gateway.
[functions.send-daysheet-email]
verify_jwt = false

# send-team-invite-email validates the caller's JWT itself via
# supabase.auth.getUser() and checks team ownership before sending.
# Disable gateway verify_jwt for the same ES256 reason.
[functions.send-team-invite-email]
verify_jwt = false

# resolve-team-invite is called from the public /invite/:token landing
# page before the recipient is signed in — it has no JWT and returns
# display-safe invite context by token.
[functions.resolve-team-invite]
verify_jwt = false

# accept-team-invite handles both the new-user signup path (no JWT; uses
# the Admin API to create the user with email_confirm=true) and the
# existing-user path (self-validates the JWT). Disable gateway verify_jwt
# so the signup path is reachable without a session.
[functions.accept-team-invite]
verify_jwt = false

# decline-team-invite is called from the public /invite/:token page. No
# JWT; the token itself is unguessable and single-use.
[functions.decline-team-invite]
verify_jwt = false
