<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Show Detail Header — Mobile (V13)</title>
<link rel="stylesheet" href="advance-tokens.css"/>
<style>
  html, body { margin:0; padding:0; background:#222; min-height:100vh; }
  body { font-family: var(--font-sans); display:flex; gap:32px; justify-content:center; align-items:flex-start; padding:32px; flex-wrap:wrap; }
  .frame-label { font: 500 11px/1 var(--font-sans); text-transform:uppercase; letter-spacing:.14em; color:#aaa; margin-bottom:10px; text-align:center; }
</style>
</head>
<body>
<div>
  <div class="frame-label">Advanced (happy path — clean)</div>
  <div id="phone-advanced"></div>
</div>
<div>
  <div class="frame-label">Not advanced (banner appears)</div>
  <div id="phone-unadvanced"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel">
const { useState } = React;

function MiniIcon({name, size=16, strokeWidth=1.75, style={}}){
  // hand-rolled common icons so we don't race lucide.createIcons across 6 frames
  const paths = {
    'arrow-left': <path d="M19 12H5M12 19l-7-7 7-7"/>,
    'more-horizontal': <><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></>,
    'map-pin': <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0116 0z"/><circle cx="12" cy="10" r="3"/></>,
    'check': <path d="M20 6L9 17l-5-5"/>,
    'check-circle-2': <><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M9 12l2 2 4-4"/></>,
    'share-2': <><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></>,
    'file-text': <><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></>,
    'car': <><path d="M19 17h2l-2-7H5l-2 7h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></>,
    'chevron-down': <path d="M6 9l6 6 6-6"/>,
    'chevron-right': <path d="M9 18l6-6-6-6"/>,
    'calendar': <><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></>,
    'dots': <><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
         strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>
      {paths[name]}
    </svg>
  );
}

function StubBody(){
  return (
    <div style={{padding:'0 16px 24px'}}>
      <div style={{display:'flex',gap:18,fontSize:13,color:'hsl(var(--muted-foreground))',borderBottom:'1px solid hsl(var(--border))',paddingBottom:10,marginBottom:14}}>
        <span style={{color:'hsl(var(--foreground))',fontWeight:500,borderBottom:'2px solid hsl(var(--foreground))',paddingBottom:10,marginBottom:-11}}>Show info</span>
        <span>Deal</span>
        <span>Contacts</span>
        <span>Set list</span>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
        <div style={{width:2,height:12,borderRadius:2,background:'hsl(var(--foreground)/0.25)'}}/>
        <span style={{font:'500 10.5px/1 var(--font-sans)',textTransform:'uppercase',letterSpacing:'0.14em',color:'hsl(var(--muted-foreground))'}}>Schedule</span>
      </div>
      {[
        ['3:00 PM','Load in'],
        ['3:30 PM','Juice soundcheck'],
        ['5:30 PM','Murdermart check'],
        ['7:00 PM','Doors'],
      ].map(([t,l],i)=>(
        <div key={i} style={{display:'grid',gridTemplateColumns:'74px 1fr',padding:'8px 0',borderBottom:i<3?'1px solid hsl(var(--border)/0.6)':'none'}}>
          <span style={{font:'500 12.5px/1 var(--font-mono)',color:'hsl(var(--muted-foreground))'}}>{t}</span>
          <span style={{fontSize:13}}>{l}</span>
        </div>
      ))}
    </div>
  );
}

function V13_UnadvancedBanner({advanced=true}){
  return (
    <div style={{background:'hsl(var(--background))', minHeight:'100%', fontFamily:'var(--font-sans)', color:'hsl(var(--foreground))'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 18px 10px',borderBottom:'1px solid hsl(var(--border))'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button style={{background:'transparent',border:0,padding:0,color:'hsl(var(--foreground))'}}><MiniIcon name="arrow-left" size={20}/></button>
          <span style={{font:'400 18px/1 var(--font-display)',letterSpacing:'-0.01em'}}>Advance</span>
        </div>
        <button style={{background:'transparent',border:0,padding:0,color:'hsl(var(--muted-foreground))'}}><MiniIcon name="dots" size={20}/></button>
      </div>
      {!advanced && (
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 16px',background:'var(--pastel-yellow-bg)',color:'var(--pastel-yellow-fg)',fontSize:12.5,fontWeight:500,borderBottom:'1px solid hsl(var(--border))'}}>
          <span style={{width:6,height:6,borderRadius:999,background:'currentColor'}}/>
          <span>Show hasn't been advanced yet</span>
          <span style={{marginLeft:'auto',textDecoration:'underline'}}>Mark advanced</span>
        </div>
      )}
      <div style={{padding:'18px 16px 14px'}}>
        <p style={{font:'500 10.5px/1.1 var(--font-sans)',textTransform:'uppercase',letterSpacing:'0.14em',color:'hsl(var(--muted-foreground))',margin:'0 0 8px'}}>Juice Spring Tour 2026 · Apr 25 Sat</p>
        <h1 style={{font:'400 28px/1.05 var(--font-display)',letterSpacing:'-0.02em',margin:0}}>Portland House of Music</h1>
        <p style={{fontSize:13,color:'hsl(var(--muted-foreground))',margin:'6px 0 0'}}>Portland, ME</p>
        <div style={{display:'flex',alignItems:'center',gap:10,marginTop:12,padding:'8px 10px',borderRadius:8,background:'hsl(var(--muted) / 0.55)',color:'hsl(var(--muted-foreground))',fontSize:12.5}}>
          <MiniIcon name="car" size={14}/>
          <span style={{fontFamily:'var(--font-mono)',fontWeight:500,color:'hsl(var(--foreground))'}}>3 hr 53 min</span>
          <span>from Burlington</span>
          <span style={{marginLeft:'auto',fontFamily:'var(--font-mono)',fontWeight:500}}>257 mi</span>
        </div>
        <div style={{display:'flex',gap:8,marginTop:14,alignItems:'center'}}>
          <button style={{flex:1,display:'inline-flex',alignItems:'center',justifyContent:'center',gap:6,height:40,borderRadius:8,background:'hsl(var(--success))',color:'#fff',border:0,fontSize:14,fontWeight:500,fontFamily:'inherit'}}>
            <MiniIcon name="check-circle-2" size={15}/> Settle show
          </button>
          <button style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:40,height:40,borderRadius:8,background:'hsl(var(--background))',color:'hsl(var(--muted-foreground))',border:'1px solid hsl(var(--input))'}}>
            <MiniIcon name="dots" size={16}/>
          </button>
        </div>
      </div>
      <StubBody/>
    </div>
  );
}

function PhoneWrap({children}){
  return <IOSDevice width={375} height={780} dark={false}>{children}</IOSDevice>;
}

ReactDOM.createRoot(document.getElementById('phone-advanced')).render(<PhoneWrap><V13_UnadvancedBanner advanced={true}/></PhoneWrap>);
ReactDOM.createRoot(document.getElementById('phone-unadvanced')).render(<PhoneWrap><V13_UnadvancedBanner advanced={false}/></PhoneWrap>);
</script>
</body>
</html>
