<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Show Detail Header — Desktop (V9)</title>
<link rel="stylesheet" href="advance-tokens.css"/>
<style>
  html, body { margin:0; padding:0; background: hsl(40 30% 97%); }
  body { font-family: var(--font-sans); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
function MiniIcon({name, size=16, strokeWidth=1.75, style={}}){
  // hand-rolled common icons so we don't race lucide.createIcons across 6 frames
  const paths = {
    'arrow-left': <path d="M19 12H5M12 19l-7-7 7-7"/>,
    'more-horizontal': <><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></>,
    'map-pin': <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0116 0z"/><circle cx="12" cy="10" r="3"/></>,
    'check': <path d="M20 6L9 17l-5-5"/>,
    'check-circle-2': <><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M9 12l2 2 4-4"/></>,
    'share-2': <><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></>,
    'file-text': <><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></>,
    'car': <><path d="M19 17h2l-2-7H5l-2 7h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></>,
    'chevron-down': <path d="M6 9l6 6 6-6"/>,
    'chevron-right': <path d="M9 18l6-6-6-6"/>,
    'calendar': <><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></>,
    'dots': <><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
         strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>
      {paths[name]}
    </svg>
  );
}

function V9_Desktop(){
  return (
    <div style={{background:'hsl(var(--background))', minHeight:'100%', fontFamily:'var(--font-sans)', color:'hsl(var(--foreground))'}}>
      {/* top nav — desktop style */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 32px',borderBottom:'1px solid hsl(var(--border))',background:'hsl(var(--background) / 0.8)',backdropFilter:'blur(6px)'}}>
        <div style={{display:'flex',alignItems:'center',gap:24}}>
          <span style={{font:'400 20px/1 var(--font-display)',letterSpacing:'-0.01em'}}>Advance</span>
          <div style={{display:'flex',gap:18,fontSize:13,color:'hsl(var(--muted-foreground))'}}>
            <span>Home</span>
            <span style={{color:'hsl(var(--foreground))',fontWeight:500}}>Shows</span>
            <span>Settings</span>
          </div>
        </div>
        <div style={{display:'flex',gap:14,fontSize:13,color:'hsl(var(--muted-foreground))'}}>
          <span>Sign out</span>
        </div>
      </div>

      <div style={{maxWidth:880,margin:'0 auto',padding:'28px 32px 24px'}}>
        {/* back link */}
        <div style={{display:'flex',alignItems:'center',gap:6,fontSize:13,color:'hsl(var(--muted-foreground))',marginBottom:18}}>
          <MiniIcon name="arrow-left" size={13}/>
          <span>All shows</span>
        </div>

        <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',gap:24,flexWrap:'wrap'}}>
          <div style={{flex:1,minWidth:0}}>
            <p style={{font:'500 10.5px/1 var(--font-sans)',textTransform:'uppercase',letterSpacing:'0.14em',color:'hsl(var(--muted-foreground))',margin:'0 0 10px'}}>
              Juice Spring Tour 2026 · Apr 25 Sat
            </p>
            <h1 style={{font:'400 36px/1.04 var(--font-display)',letterSpacing:'-0.025em',margin:0}}>
              Portland House of Music
              <span style={{display:'inline-flex',alignItems:'center',gap:4,fontFamily:'var(--font-sans)',fontSize:11,fontWeight:500,borderRadius:999,padding:'3px 10px',background:'var(--pastel-green-bg)',color:'var(--pastel-green-fg)',marginLeft:12,verticalAlign:'middle'}}>
                <MiniIcon name="check" size={11}/> Advanced
              </span>
            </h1>
            <div style={{display:'flex',alignItems:'center',gap:16,marginTop:10,fontSize:13,color:'hsl(var(--muted-foreground))'}}>
              <span style={{display:'inline-flex',alignItems:'center',gap:5}}>
                <MiniIcon name="map-pin" size={12}/> 25 Temple St, Portland, ME 04101
              </span>
              <span style={{width:3,height:3,borderRadius:999,background:'hsl(var(--muted-foreground) / 0.5)'}}/>
              <span style={{display:'inline-flex',alignItems:'center',gap:5}}>
                <MiniIcon name="car" size={12}/>
                <span style={{fontFamily:'var(--font-mono)',color:'hsl(var(--foreground))',fontWeight:500}}>3 hr 53 min</span>
                <span>from Burlington</span>
                <span style={{opacity:0.6}}>·</span>
                <span style={{fontFamily:'var(--font-mono)'}}>257 mi</span>
              </span>
            </div>
          </div>

          {/* full button row on desktop */}
          <div style={{display:'flex',gap:8,flexShrink:0}}>
            <button style={{display:'inline-flex',alignItems:'center',gap:6,height:38,padding:'0 16px',borderRadius:8,background:'hsl(var(--success))',color:'#fff',border:0,fontSize:13.5,fontWeight:500,fontFamily:'inherit'}}>
              <MiniIcon name="check-circle-2" size={14}/> Settle show
            </button>
            <button style={{display:'inline-flex',alignItems:'center',gap:6,height:38,padding:'0 14px',borderRadius:8,background:'hsl(var(--background))',color:'hsl(var(--foreground))',border:'1px solid hsl(var(--input))',fontSize:13.5,fontWeight:500,fontFamily:'inherit'}}>
              <MiniIcon name="file-text" size={14}/> Import
            </button>
            <button style={{display:'inline-flex',alignItems:'center',gap:6,height:38,padding:'0 14px',borderRadius:8,background:'hsl(var(--secondary))',color:'hsl(var(--foreground))',border:0,fontSize:13.5,fontWeight:500,fontFamily:'inherit'}}>
              <MiniIcon name="share-2" size={14}/> Share
            </button>
          </div>
        </div>

        {/* tabs */}
        <div style={{display:'flex',gap:22,fontSize:13.5,color:'hsl(var(--muted-foreground))',borderBottom:'1px solid hsl(var(--border))',marginTop:28,paddingBottom:12}}>
          <span style={{color:'hsl(var(--foreground))',fontWeight:500,borderBottom:'2px solid hsl(var(--foreground))',paddingBottom:13,marginBottom:-13}}>Show info</span>
          <span>Deal info</span>
          <span>Contacts</span>
          <span>Set list</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<V9_Desktop/>);
</script>
</body>
</html>
