<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Guest list editor — explorations</title>
  <link rel="stylesheet" href="colors_and_type.css"/>
  <style>
    html,body{margin:0;padding:0;background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-sans);}
    body{font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
    *{box-sizing:border-box;}
    /* hide native number input spinners */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
    input[type=number]{-moz-appearance:textfield;}
    .stage{max-width:760px;margin:0 auto;padding:48px 24px 96px;}
    .doc-eyebrow{font:500 11px/1.2 var(--font-sans);text-transform:uppercase;letter-spacing:0.14em;color:hsl(var(--muted-foreground));margin:0 0 8px;}
    .doc-title{font:500 28px/1.1 var(--font-sans);letter-spacing:-0.02em;margin:0 0 8px;}
    .doc-sub{font-size:14px;color:hsl(var(--muted-foreground));margin:0 0 36px;max-width:62ch;}
    /* tap area for ghost actions */
    .tap{cursor:pointer;transition:background-color 150ms var(--ease-out),color 150ms var(--ease-out),border-color 150ms var(--ease-out),opacity 150ms var(--ease-out);}
  </style>

  <!-- Speaker notes hook (none) -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Primitives.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="GuestListA.jsx"></script>
  <script type="text/babel" src="GuestListB.jsx"></script>
  <script type="text/babel" src="GuestListC.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
