<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<title>Day of Show Mode — Advance</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="icon" href="assets/logo.svg" type="image/svg+xml">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body {
    margin: 0; padding: 0;
    background: hsl(var(--background));
    color: hsl(var(--foreground));
    font-family: var(--font-sans);
    overscroll-behavior: contain;
    min-height: 100vh;
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; cursor: pointer; }
  a { color: inherit; text-decoration: none; }
  [data-lucide] { display: inline-block; width: 1em; height: 1em; }

  /* ---- App stage: dark editorial backdrop with phone centered ---- */
  .stage {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 28px 16px 40px;
    gap: 18px;
    background:
      radial-gradient(1100px 700px at 50% 0%, hsl(30 10% 13%) 0%, hsl(30 10% 8%) 60%, hsl(30 10% 6%) 100%);
  }

  /* phone frame */
  .phone-frame {
    width: 390px;
    max-width: calc(100vw - 32px);
    height: 844px;
    max-height: calc(100vh - 200px);
    min-height: 700px;
    border-radius: 44px;
    background: #000;
    padding: 10px;
    position: relative;
    box-shadow:
      0 0 0 1px hsl(30 8% 22%),
      0 0 0 9px hsl(30 8% 14%),
      0 0 0 10px hsl(30 8% 22%),
      0 30px 80px rgba(0,0,0,.55),
      0 6px 20px rgba(0,0,0,.4);
    flex-shrink: 0;
  }
  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: 36px;
    overflow: hidden;
    position: relative;
    background: hsl(var(--background));
  }
  .phone-notch {
    position: absolute;
    top: 18px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 30px;
    background: #000;
    border-radius: 18px;
    z-index: 50;
    pointer-events: none;
  }

  /* fade-in */
  .fade-in { animation: fi 320ms var(--ease-editorial) both; }
  @keyframes fi { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: none;} }

  /* phase morph */
  .phase-morph { animation: pm 380ms var(--ease-in-out) both; }
  @keyframes pm { from { opacity: 0; transform: translateY(8px) scale(0.985);} to { opacity: 1; transform: none;} }

  /* glowing mic chip */
  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 0 0 hsl(var(--badge-new) / 0.55), 0 0 16px 0 hsl(var(--badge-new) / 0.45); }
    50%      { box-shadow: 0 0 0 6px hsl(var(--badge-new) / 0), 0 0 22px 2px hsl(var(--badge-new) / 0.7); }
  }
  .mic-glow { animation: mic-pulse 2.4s ease-in-out infinite; }

  /* slow stagger inside phase */
  .stagger > * { opacity: 0; animation: fi 320ms var(--ease-editorial) forwards; }
  .stagger > *:nth-child(1){animation-delay:40ms}
  .stagger > *:nth-child(2){animation-delay:90ms}
  .stagger > *:nth-child(3){animation-delay:140ms}
  .stagger > *:nth-child(4){animation-delay:190ms}
  .stagger > *:nth-child(5){animation-delay:240ms}
  .stagger > *:nth-child(6){animation-delay:280ms}
  .stagger > *:nth-child(n+7){animation-delay:320ms}

  /* hide scrollbar inside phone */
  .phone-screen *::-webkit-scrollbar { width: 0; height: 0; }
  .phone-screen * { scrollbar-width: none; }

  /* shake-prevention for the time as it counts down */
  .tab-num { font-variant-numeric: tabular-nums; }

  /* press affordance for nav-able rows */
  .pressable {
    transition: transform 160ms var(--ease-out), background-color 160ms var(--ease-out);
  }
  .pressable:active { transform: scale(0.98); }

  /* scrubber chrome */
  .scrubber {
    display: flex;
    align-items: center;
    gap: 2px;
    background: hsl(30 10% 12%);
    border: 1px solid hsl(30 8% 20%);
    border-radius: 999px;
    padding: 4px;
    color: hsl(var(--muted-foreground));
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }
  .scrubber button {
    background: transparent;
    border: 0;
    color: inherit;
    padding: 6px 14px;
    border-radius: 999px;
    transition: background-color 180ms var(--ease-out), color 180ms var(--ease-out);
    font: inherit;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 11px;
    cursor: pointer;
  }
  .scrubber button.active {
    background: hsl(30 8% 20%);
    color: hsl(var(--foreground));
  }
  .scrubber button:hover:not(.active) { color: hsl(var(--foreground)); }

  .stage-cap {
    font: 500 11px/1 var(--font-sans);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: hsl(var(--muted-foreground));
    text-align: center;
    margin-top: 6px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="dos-data.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="dos-primitives.jsx"></script>
<script type="text/babel" src="dos-dashboard.jsx"></script>
<script type="text/babel" src="dos-mode.jsx"></script>
<script type="text/babel" src="dos-app.jsx"></script>
<script>
  window.addEventListener('load', () => window.lucide && window.lucide.createIcons());
  setInterval(() => window.lucide && window.lucide.createIcons(), 700);
</script>
</body>
</html>
