<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<title>Day of Show — Variants Canvas</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="icon" href="assets/logo.svg" type="image/svg+xml">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body {
    margin: 0; padding: 0;
    background: hsl(30 10% 6%);
    color: hsl(var(--foreground));
    font-family: var(--font-sans);
    min-height: 100vh;
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  [data-lucide] { display: inline-block; }

  /* Phone shell — same chrome as prototype but lighter weight */
  .pframe {
    width: 360px;
    height: 760px;
    border-radius: 40px;
    background: #000;
    padding: 8px;
    position: relative;
    box-shadow:
      0 0 0 1px hsl(30 8% 22%),
      0 0 0 8px hsl(30 8% 14%),
      0 0 0 9px hsl(30 8% 22%),
      0 18px 50px rgba(0,0,0,.55);
  }
  .pscreen {
    width: 100%;
    height: 100%;
    border-radius: 32px;
    overflow: hidden;
    position: relative;
    background: hsl(var(--background));
  }
  .pnotch {
    position: absolute;
    top: 14px; left: 50%; transform: translateX(-50%);
    width: 100px; height: 26px;
    background: #000;
    border-radius: 16px;
    z-index: 50;
  }

  @keyframes mic-pulse-c {
    0%,100% { box-shadow: 0 0 0 0 hsl(var(--badge-new) / 0.55), 0 0 16px 0 hsl(var(--badge-new) / 0.45); }
    50%     { box-shadow: 0 0 0 6px hsl(var(--badge-new) / 0), 0 0 22px 2px hsl(var(--badge-new) / 0.7); }
  }
  .mic-glow-c { animation: mic-pulse-c 2.4s ease-in-out infinite; }

  .pscreen *::-webkit-scrollbar { display:none; }
  .pscreen * { scrollbar-width: none; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="dos-data.jsx"></script>
<script type="text/babel" src="dos-primitives.jsx"></script>
<script type="text/babel" src="dos-dashboard.jsx"></script>
<script type="text/babel" src="dos-mode.jsx"></script>
<script type="text/babel" src="phase2-variants.jsx"></script>
<script type="text/babel" src="phase2-settle-variants.jsx"></script>
<script type="text/babel" src="canvas-frames.jsx"></script>
<script>
  window.addEventListener('load', () => window.lucide && window.lucide.createIcons());
  setInterval(() => window.lucide && window.lucide.createIcons(), 700);
</script>
</body>
</html>
