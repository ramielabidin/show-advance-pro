<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Accept-invite landing · Advance</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #f4efe6; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="browser-window.jsx"></script>

  <script type="text/babel">
    const Frame = ({ url, src }) => (
      <ChromeWindow
        url={url}
        tabs={[{ title: 'Advance — Join the crew' }]}
        activeIndex={0}
        width="100%"
        height="100%"
      >
        <iframe
          src={src}
          title={url}
          style={{ width: '100%', height: '100%', border: 0, display: 'block', background: '#f9f7f4' }}
        />
      </ChromeWindow>
    );

    const App = () => (
      <DesignCanvas>
        <DCSection
          id="landing"
          title="Accept-invite landing"
          subtitle="Continuation of Option C (Dispatch). Two states: new user fills out a form, existing user confirms in one click."
        >
          <DCArtboard id="new" label="A · New user — set up account" width={760} height={1360}>
            <Frame url="advance.fm/invite/a7k2p9" src="pages/new-user.html" />
          </DCArtboard>

          <DCArtboard id="existing" label="B · Existing user — confirm" width={760} height={1180}>
            <Frame url="advance.fm/invite/a7k2p9" src="pages/existing-user.html" />
          </DCArtboard>
        </DCSection>

        <DCSection
          id="notes"
          title="How it continues from the email"
          subtitle="Exact visual carry-over from the Dispatch email so the user never feels they've left the letter."
        >
          <DCArtboard id="notes" label="Carry-over notes" width={620} height={520}>
            <div style={{
              background:'#fbf8f2', border:'1px solid #e5dfd2', borderRadius:12,
              padding:'26px 28px', width:'100%', height:'100%', boxSizing:'border-box', overflowY:'auto'
            }}>
              <div style={{
                fontFamily:'JetBrains Mono, monospace', fontSize:11, letterSpacing:'0.18em',
                textTransform:'uppercase', color:'#8b8375', marginBottom:14
              }}>— — — Design continuity — — —</div>
              <h3 style={{
                fontFamily:'DM Serif Display, serif', fontWeight:400, fontSize:24,
                letterSpacing:'-0.02em', margin:'0 0 16px', lineHeight:1.1
              }}>Same letter, next page.</h3>

              {[
                ['Canvas', 'Warm off-white #f9f7f4 — identical to email body. No card, no panel, no chrome. The page IS the letter.'],
                ['Wordmark', 'Same 24px dark-tile "A" + serif "Advance" lockup from the email header.'],
                ['Slug line', 'Mono eyebrow with em-dashes — "— — — Accepting Maya\'s invite — — —" mirrors email\'s "Dispatch from Maya" pattern.'],
                ['Hero', 'DM Serif Display, 54px, 3-line stacked. Tone: "You\'re in. Set up your account." / "Almost there."'],
                ['Dash rule', 'Same 28×2px dark rule between hero and body copy.'],
                ['Data block', 'Top+bottom 1px #1f1d1a rules, inner #e5dfd2 dividers, mono 10px keys. Exact copy of the email\'s data table.'],
                ['CTA', 'Dark pill — #1f1d1a bg, #f9f7f4 text, 17×28 padding, 26px radius. Identical to email.'],
                ['SSO (new)', 'Google button comes FIRST — pill shape to echo the dark CTA, but light-tile background so the primary path (dark pill) stays visually dominant. "Matches invite" mono tag flags the happy path.'],
                ['Mismatch', 'If the Google account ≠ the invited email, the flow shows a confirmation step before completing — never silent re-association.'],
                ['Form (new)', 'Underline-only inputs below an editorial "or set a password" divider. Email locked & shown in mono.'],
                ['Confirm (existing)', 'Single "whoami" card with pastel-green avo, reusing the Advance card chrome.'],
              ].map(([k, v], i) => (
                <div key={k} style={{
                  display:'flex', gap:16, padding:'11px 0',
                  borderTop: i === 0 ? 'none' : '1px solid rgba(31,29,26,0.08)',
                  fontSize:13, lineHeight:1.5
                }}>
                  <div style={{
                    width:110, flexShrink:0,
                    fontFamily:'JetBrains Mono, monospace',
                    fontSize:10, letterSpacing:'0.2em', textTransform:'uppercase',
                    color:'#8b8375', paddingTop:2
                  }}>{k}</div>
                  <div style={{ flex:1, color:'#2a2824' }}>{v}</div>
                </div>
              ))}
            </div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
