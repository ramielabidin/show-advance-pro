<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<title>Advance — UI Kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="icon" href="../../assets/logo.svg" type="image/svg+xml">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html,body{margin:0;padding:0;background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-sans);overscroll-behavior-y:contain}
  *{box-sizing:border-box}
  button{font-family:inherit;cursor:pointer}
  a{color:inherit;text-decoration:none}
  [data-lucide]{display:inline-block;width:1em;height:1em}
  .fade-in{animation:fi 260ms var(--ease-editorial) both}
  @keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .stagger>*{opacity:0;animation:fi 260ms var(--ease-out) forwards}
  .stagger>*:nth-child(1){animation-delay:0ms}
  .stagger>*:nth-child(2){animation-delay:40ms}
  .stagger>*:nth-child(3){animation-delay:80ms}
  .stagger>*:nth-child(4){animation-delay:120ms}
  .stagger>*:nth-child(5){animation-delay:160ms}
  .stagger>*:nth-child(6){animation-delay:200ms}
  .stagger>*:nth-child(7){animation-delay:240ms}
  .stagger>*:nth-child(n+8){animation-delay:280ms}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="./Primitives.jsx"></script>
<script type="text/babel" src="./AppChrome.jsx"></script>
<script type="text/babel" src="./Dashboard.jsx"></script>
<script type="text/babel" src="./ShowsList.jsx"></script>
<script type="text/babel" src="./ShowDetail.jsx"></script>
<script type="text/babel" src="./Settings.jsx"></script>
<script type="text/babel" src="./App.jsx"></script>
<script>window.addEventListener('load',()=>lucide.createIcons());</script>
</body>
</html>
