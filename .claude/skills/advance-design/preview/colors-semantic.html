<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Colors — Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:18px 22px;background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-sans)}
.row{display:flex;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid hsl(var(--border)/.6)}
.row:last-child{border-bottom:0}
.sw{width:38px;height:38px;border-radius:8px;flex-shrink:0}
.nm{min-width:130px;font-size:13px;font-weight:500}
.hex{font:500 11px/1 var(--font-mono);color:hsl(var(--muted-foreground));min-width:120px}
.use{font-size:12px;color:hsl(var(--muted-foreground))}
</style></head><body>
<div class="row"><div class="sw" style="background:hsl(152 60% 40%)"></div><div class="nm">--success</div><div class="hex">152 60% 40%</div><div class="use">Settle button</div></div>
<div class="row"><div class="sw" style="background:hsl(38 92% 50%)"></div><div class="nm">--warning</div><div class="hex">38 92% 50%</div><div class="use">attention · dot indicator</div></div>
<div class="row"><div class="sw" style="background:hsl(210 80% 52%)"></div><div class="nm">--badge-new</div><div class="hex">210 80% 52%</div><div class="use">"New" badge on unreviewed show</div></div>
<div class="row"><div class="sw" style="background:hsl(0 72% 51%)"></div><div class="nm">--destructive</div><div class="hex">0 72% 51%</div><div class="use">Delete · remove</div></div>
</body></html>
