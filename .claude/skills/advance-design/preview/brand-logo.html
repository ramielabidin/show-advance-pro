<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Brand — Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px;background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-sans);display:flex;align-items:center;gap:22px}
.mark{width:96px;height:96px;border-radius:18%;overflow:hidden;flex-shrink:0}
.mark img{display:block;width:100%;height:100%}
.text{display:flex;flex-direction:column;gap:6px}
.word{font-family:var(--font-display);font-size:34px;letter-spacing:-0.02em;line-height:1}
.sub{font-size:13px;color:hsl(var(--muted-foreground))}
.meta{font:500 10.5px/1 var(--font-mono);color:hsl(var(--muted-foreground));margin-top:6px}
</style></head><body>
<div class="mark"><img src="../assets/logo.svg" alt="Advance logo"></div>
<div class="text">
  <div class="word">Advance</div>
  <div class="sub">Tour management · show advancing</div>
  <div class="meta">Mark #221F1C · Canvas #F9F7F4 · DM Serif Display</div>
</div>
</body></html>
