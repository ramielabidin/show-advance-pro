<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px;background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-sans)}
.row{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
.card{border:1px solid hsl(var(--border));background:hsl(var(--card));border-radius:10px;padding:12px 14px;width:150px}
.c0{}
.c1{box-shadow:0 2px 8px rgba(0,0,0,.04)}
.c2{box-shadow:0 8px 24px rgba(0,0,0,.06)}
.lbl{font:500 10.5px/1.1 var(--font-sans);text-transform:uppercase;letter-spacing:.14em;color:hsl(var(--muted-foreground));margin-bottom:6px}
.ttl{font-size:13px;font-weight:500}
.note{font-size:12px;color:hsl(var(--muted-foreground));margin-top:14px;line-height:1.45}
</style></head><body>
<div class="row">
  <div class="card c0"><div class="lbl">at rest</div><div class="ttl">Card</div></div>
  <div class="card c1"><div class="lbl">hover</div><div class="ttl">Card · lifted</div></div>
  <div class="card c2"><div class="lbl">dropdown</div><div class="ttl">Popover / menu</div></div>
</div>
<div class="note">Borders, not shadows. <code>shadow-sm</code> only on hover of <code>card-pressable</code>. Dropdowns get a one-off soft shadow. <code>shadow-lg</code> / <code>shadow-xl</code> are banned.</div>
</body></html>
