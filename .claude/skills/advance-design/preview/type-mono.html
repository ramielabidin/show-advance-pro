<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Type — Mono</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px 24px;background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-sans)}
.label{font:500 10.5px/1.2 var(--font-sans);text-transform:uppercase;letter-spacing:.14em;color:hsl(var(--muted-foreground));margin-bottom:10px}
.pair{display:grid;grid-template-columns:100px 1fr;gap:14px 16px;align-items:baseline;margin-bottom:6px}
.pair span:first-child{font-size:13px;color:hsl(var(--muted-foreground))}
.mono{font-family:var(--font-mono);font-weight:500;font-size:13px;letter-spacing:-0.01em}
.spec{font:500 10.5px/1.3 var(--font-mono);color:hsl(var(--muted-foreground));margin-top:10px}
</style></head><body>
<div class="label">Data · JetBrains Mono</div>
<div class="pair"><span>Phone</span><span class="mono">(512) 478 0226</span></div>
<div class="pair"><span>Load in</span><span class="mono">14:30</span></div>
<div class="pair"><span>Walkout</span><span class="mono">$1,847.50</span></div>
<div class="pair"><span>Booking code</span><span class="mono">MH-03142-EAS</span></div>
<div class="spec">Used only for data: times, phones, money, IDs, addresses-as-data. Never for prose.</div>
</body></html>
