<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Brand — Icon set</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px 22px;background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-sans)}
.grid{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}
.item{display:flex;flex-direction:column;align-items:center;gap:6px}
.item img{display:block;border-radius:22%;border:1px solid hsl(var(--border))}
.nm{font-size:11px;color:hsl(var(--muted-foreground))}
.note{margin-top:14px;font-size:12px;color:hsl(var(--muted-foreground));line-height:1.45}
</style></head><body>
<div class="grid">
  <div class="item"><img src="../assets/logo.svg" width="72" height="72"><div class="nm">icon.svg · 512²</div></div>
  <div class="item"><img src="../assets/apple-touch-icon.png" width="60" height="60"><div class="nm">apple · 180²</div></div>
  <div class="item"><img src="../assets/app-icon-192.png" width="48" height="48"><div class="nm">pwa · 192²</div></div>
  <div class="item"><img src="../assets/app-icon-512.png" width="40" height="40"><div class="nm">pwa · 512²</div></div>
  <div class="item"><img src="../assets/maskable-icon-512.png" width="40" height="40"><div class="nm">maskable</div></div>
</div>
<div class="note">The only brand marks. No illustrated or photographic assets ship today — UI is the brand surface.</div>
</body></html>
