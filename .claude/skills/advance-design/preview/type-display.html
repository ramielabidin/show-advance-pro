<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px 24px;background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-sans)}
.label{font:500 10.5px/1.2 var(--font-sans);text-transform:uppercase;letter-spacing:.14em;color:hsl(var(--muted-foreground));margin-bottom:4px}
.row{display:flex;align-items:baseline;gap:16px;margin-bottom:14px}
.disp{font-family:var(--font-display);letter-spacing:-0.03em;line-height:1}
.num36{font-size:36px}.num28{font-size:28px}.num22{font-size:22px}
.spec{font:500 10.5px/1 var(--font-mono);color:hsl(var(--muted-foreground))}
</style></head><body>
<div class="label">Display · DM Serif Display</div>
<div class="row"><span class="disp num36">27</span><span class="spec">36 / 40 · tracking −3%</span></div>
<div class="row"><span class="disp num28">$4,280</span><span class="spec">28 · stat card</span></div>
<div class="row"><span class="disp num22">Fri · Mar 14</span><span class="spec">22 · show date</span></div>
<div class="spec" style="margin-top:8px">Used for: stat numbers, show-card dates, drive-time callouts, logo wordmark. Never for body or buttons.</div>
</body></html>
