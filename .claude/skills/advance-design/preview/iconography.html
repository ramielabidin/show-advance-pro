<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Lucide icons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>body{margin:0;padding:20px 22px;background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-sans)}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px 10px}
.item{display:flex;flex-direction:column;align-items:center;gap:6px;color:hsl(var(--foreground))}
.item svg{width:22px;height:22px;stroke-width:1.5}
.nm{font:500 10.5px/1 var(--font-mono);color:hsl(var(--muted-foreground))}
.note{margin-top:12px;font-size:12px;color:hsl(var(--muted-foreground));line-height:1.45}
</style></head><body>
<div class="grid">
  <div class="item"><i data-lucide="calendar"></i><span class="nm">calendar</span></div>
  <div class="item"><i data-lucide="file-text"></i><span class="nm">file-text</span></div>
  <div class="item"><i data-lucide="settings"></i><span class="nm">settings</span></div>
  <div class="item"><i data-lucide="map-pin"></i><span class="nm">map-pin</span></div>
  <div class="item"><i data-lucide="chevron-right"></i><span class="nm">chevron-right</span></div>
  <div class="item"><i data-lucide="sparkles"></i><span class="nm">sparkles</span></div>
  <div class="item"><i data-lucide="check-circle-2"></i><span class="nm">check-circle-2</span></div>
  <div class="item"><i data-lucide="mic"></i><span class="nm">mic</span></div>
  <div class="item"><i data-lucide="loader-2"></i><span class="nm">loader-2</span></div>
  <div class="item"><i data-lucide="sun"></i><span class="nm">sun</span></div>
  <div class="item"><i data-lucide="moon"></i><span class="nm">moon</span></div>
  <div class="item"><i data-lucide="log-out"></i><span class="nm">log-out</span></div>
</div>
<div class="note">Lucide React · 1.5px stroke · 16/20px standard · no emoji, no custom SVGs.</div>
<script>lucide.createIcons();</script>
</body></html>
