<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Type — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px 24px;background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-sans)}
.row{display:flex;align-items:baseline;gap:14px;padding:6px 0;border-bottom:1px solid hsl(var(--border)/.6)}
.row:last-child{border-bottom:0}
.lbl{width:140px;font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:hsl(var(--muted-foreground));font-weight:500}
.spec{font:500 10.5px/1 var(--font-mono);color:hsl(var(--muted-foreground));margin-left:auto}
.disp{font-family:var(--font-display);letter-spacing:-0.03em;line-height:1}
.eyebrow{font:500 11px/1 var(--font-sans);text-transform:uppercase;letter-spacing:.14em;color:hsl(var(--muted-foreground))}
.section-label{font:500 11px/1 var(--font-sans);text-transform:uppercase;letter-spacing:.14em;color:hsl(var(--muted-foreground))}
.title{font-size:28px;line-height:1.1;letter-spacing:-0.02em;font-weight:500}
.body{font-size:14px;line-height:1.5}
.caption{font-size:12px;color:hsl(var(--muted-foreground))}
.chip{font-size:10px;text-transform:uppercase;letter-spacing:.12em;font-weight:500}
</style></head><body>
<div class="row"><span class="lbl">Display 36</span><span class="disp" style="font-size:36px">$4,280</span><span class="spec">display · −3%</span></div>
<div class="row"><span class="lbl">Title</span><span class="title">Spring Routing</span><span class="spec">28 · 500 · −2%</span></div>
<div class="row"><span class="lbl">Eyebrow</span><span class="eyebrow">TOUR</span><span class="spec">11 · 500 · +14%</span></div>
<div class="row"><span class="lbl">Body</span><span class="body">Mark as advanced</span><span class="spec">14 · 400</span></div>
<div class="row"><span class="lbl">Caption</span><span class="caption">Updated 2 min ago</span><span class="spec">12 · 400 · muted</span></div>
<div class="row"><span class="lbl">Chip</span><span class="chip">Settled</span><span class="spec">10 · 500 caps</span></div>
</body></html>
