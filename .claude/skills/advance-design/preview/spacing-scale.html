<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:18px 22px;background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-sans);font-size:13px}
.row{display:flex;align-items:center;gap:12px;padding:7px 0}
.nm{width:60px;font-weight:500}
.px{width:60px;font:500 11px/1 var(--font-mono);color:hsl(var(--muted-foreground))}
.bar{height:12px;background:hsl(30 10% 12%);border-radius:2px}
.use{margin-left:auto;font-size:12px;color:hsl(var(--muted-foreground))}
</style></head><body>
<div class="row"><span class="nm">2</span><span class="px">8px</span><div class="bar" style="width:8px"></div><span class="use">tight — related items</span></div>
<div class="row"><span class="nm">3</span><span class="px">12px</span><div class="bar" style="width:12px"></div><span class="use">list row gap</span></div>
<div class="row"><span class="nm">4</span><span class="px">16px</span><div class="bar" style="width:16px"></div><span class="use">form fields</span></div>
<div class="row"><span class="nm">6</span><span class="px">24px</span><div class="bar" style="width:24px"></div><span class="use">section · mobile</span></div>
<div class="row"><span class="nm">8</span><span class="px">32px</span><div class="bar" style="width:32px"></div><span class="use">section · desktop</span></div>
</body></html>
