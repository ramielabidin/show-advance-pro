<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Empty state</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:18px 22px;background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-sans);text-align:center}
.wrap{padding:22px 10px}
.ic{width:52px;height:52px;border-radius:999px;background:hsl(var(--muted));margin:0 auto 12px;display:flex;align-items:center;justify-content:center;color:hsl(var(--muted-foreground));font-size:22px}
h3{font-family:var(--font-sans);font-size:16px;font-weight:500;margin:0 0 4px}
p{font-size:13px;color:hsl(var(--muted-foreground));margin:0 auto 14px;max-width:320px;line-height:1.5}
button{height:36px;padding:0 14px;border-radius:8px;background:hsl(var(--primary));color:hsl(var(--primary-foreground));border:0;font:500 13px/1 var(--font-sans);cursor:pointer}
</style></head><body>
<div class="wrap">
  <div class="ic">◷</div>
  <h3>No upcoming shows</h3>
  <p>Add a show manually or paste an advance email to get started.</p>
  <button>+ Add show</button>
</div>
</body></html>
