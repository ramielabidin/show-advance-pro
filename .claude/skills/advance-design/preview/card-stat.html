<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Stat card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:18px 22px;background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{border:1px solid hsl(var(--border));background:hsl(var(--card));border-radius:10px;padding:12px 14px}
.top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ico{width:22px;height:22px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:13px}
.lbl{font:500 10.5px/1.1 var(--font-sans);text-transform:uppercase;letter-spacing:.09em;color:hsl(var(--muted-foreground))}
.val{font-family:var(--font-display);font-size:28px;letter-spacing:-0.03em;line-height:1}
</style></head><body>
<div class="card"><div class="top"><span class="ico" style="background:var(--pastel-blue-bg);color:var(--pastel-blue-fg)">◎</span><span class="lbl">Upcoming</span></div><div class="val">12</div></div>
<div class="card"><div class="top"><span class="ico" style="background:var(--pastel-green-bg);color:var(--pastel-green-fg)">✓</span><span class="lbl">Settled</span></div><div class="val">8</div></div>
<div class="card"><div class="top"><span class="ico" style="background:var(--pastel-yellow-bg);color:var(--pastel-yellow-fg)">◐</span><span class="lbl">Pending</span></div><div class="val">4</div></div>
<div class="card"><div class="top"><span class="ico" style="background:var(--pastel-red-bg);color:var(--pastel-red-fg)">!</span><span class="lbl">Within 7 days</span></div><div class="val">2</div></div>
</body></html>
