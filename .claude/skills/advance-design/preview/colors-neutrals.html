<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Colors — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:18px 22px;background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-sans)}
.row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid hsl(var(--border)/.6)}
.row:last-child{border-bottom:0}
.sw{width:36px;height:36px;border-radius:8px;border:1px solid hsl(var(--border));flex-shrink:0}
.name{font-size:13px;font-weight:500;min-width:140px}
.hex{font:500 11px/1 var(--font-mono);color:hsl(var(--muted-foreground));min-width:130px}
.use{font-size:12px;color:hsl(var(--muted-foreground))}
</style></head><body>
<div class="row"><div class="sw" style="background:hsl(30 10% 12%)"></div><div class="name">foreground</div><div class="hex">30 10% 12%</div><div class="use">body text</div></div>
<div class="row"><div class="sw" style="background:hsl(30 8% 50%)"></div><div class="name">muted-fg</div><div class="hex">30 8% 50%</div><div class="use">secondary text</div></div>
<div class="row"><div class="sw" style="background:hsl(30 6% 62%)"></div><div class="name">text-tertiary</div><div class="hex">30 6% 62%</div><div class="use">captions, meta</div></div>
<div class="row"><div class="sw" style="background:hsl(35 20% 93%)"></div><div class="name">secondary / accent</div><div class="hex">35 20% 93%</div><div class="use">hover bg, nav pill</div></div>
<div class="row"><div class="sw" style="background:hsl(35 15% 94%)"></div><div class="name">muted</div><div class="hex">35 15% 94%</div><div class="use">quiet surfaces</div></div>
<div class="row"><div class="sw" style="background:hsl(35 18% 90%)"></div><div class="name">border</div><div class="hex">35 18% 90%</div><div class="use">all borders + dividers</div></div>
</body></html>
