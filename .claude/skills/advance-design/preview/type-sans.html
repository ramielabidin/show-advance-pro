<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Type — Sans</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px 24px;background:hsl(var(--background));color:hsl(var(--foreground));font-family:var(--font-sans)}
.label{font:500 10.5px/1.2 var(--font-sans);text-transform:uppercase;letter-spacing:.14em;color:hsl(var(--muted-foreground));margin-bottom:4px}
.row{display:flex;align-items:baseline;gap:16px;margin-bottom:10px}
.title{font-size:28px;letter-spacing:-0.02em;line-height:1.1;font-weight:500}
.sub{font-size:14px;color:hsl(var(--muted-foreground))}
.body{font-size:14px;line-height:1.5}
.eyebrow{font:500 11px/1.2 var(--font-sans);text-transform:uppercase;letter-spacing:.14em;color:hsl(var(--muted-foreground))}
.spec{font:500 10.5px/1 var(--font-mono);color:hsl(var(--muted-foreground))}
</style></head><body>
<div class="label">UI · DM Sans</div>
<div style="margin-bottom:8px"><span class="eyebrow">TOUR</span></div>
<div class="title">Spring Eastern Routing</div>
<div class="sub">12 shows · Mar 14 — Apr 08</div>
<div style="margin-top:14px" class="body">All UI text uses DM Sans. Page titles sit at 28/32 with tracking-tight; body defaults to 14 / 1.5; secondary copy adds text-muted-foreground.</div>
<div class="spec" style="margin-top:10px">Title 28 · Body 14 · Eyebrow 11 caps · Muted hsl(30 8% 50%)</div>
</body></html>
